<html lang="uk">

</head>
<body>

  <h1>Оберіть тарифний план ✓</h1>

  <div class="toggle-wrap">

  </div>

  <div id="loader" class="loader hidden">Завантаження даних...</div>

  <div class="plans" id="plans-container"></div>

  <div id="confirm-box" class="confirm-box hidden">
    <span id="confirm-text"></span>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <script src="script.js"></script>
